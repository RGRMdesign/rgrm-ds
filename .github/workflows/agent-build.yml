name: Trigger component build agent

# Starts a Cursor automation (webhook) when a maintainer adds label agent:build.
# Secrets: CURSOR_AUTOMATION_WEBHOOK_URL, CURSOR_AUTOMATION_WEBHOOK_TOKEN
# Setup: docs/cursor-automation-build-component.md

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

concurrency:
  group: agent-build-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  trigger-cursor-automation:
    if: |
      github.event.label.name == 'agent:build' &&
      github.event.sender.login == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - name: Verify Cursor webhook secrets
        env:
          WEBHOOK_URL: ${{ secrets.CURSOR_AUTOMATION_WEBHOOK_URL }}
          WEBHOOK_TOKEN: ${{ secrets.CURSOR_AUTOMATION_WEBHOOK_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK_URL}" ] || [ -z "${WEBHOOK_TOKEN}" ]; then
            echo "::error::Add repository secrets CURSOR_AUTOMATION_WEBHOOK_URL and CURSOR_AUTOMATION_WEBHOOK_TOKEN (see docs/cursor-automation-build-component.md)."
            exit 1
          fi

      - name: Trigger Cursor automation
        env:
          GH_TOKEN: ${{ github.token }}
          WEBHOOK_URL: ${{ secrets.CURSOR_AUTOMATION_WEBHOOK_URL }}
          WEBHOOK_TOKEN: ${{ secrets.CURSOR_AUTOMATION_WEBHOOK_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
          SENDER: ${{ github.event.sender.login }}
        run: |
          set -euo pipefail

          ISSUE_JSON="$(gh api "repos/${REPOSITORY}/issues/${ISSUE_NUMBER}")"
          PAYLOAD="$(echo "${ISSUE_JSON}" | jq -c \
            --arg event "github.issue.labeled" \
            --arg repository "${REPOSITORY}" \
            --arg label "agent:build" \
            --arg sender "${SENDER}" \
            '{
              event: $event,
              repository: $repository,
              label: $label,
              sender: $sender,
              issue: {
                number: .number,
                title: .title,
                body: .body,
                url: .html_url
              }
            }')"

          HTTP_CODE="$(curl -sS -o /tmp/cursor-webhook-response.txt -w "%{http_code}" \
            -X POST "${WEBHOOK_URL}" \
            -H "Authorization: Bearer ${WEBHOOK_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}")"

          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "::group::Cursor webhook response"
            cat /tmp/cursor-webhook-response.txt
            echo "::endgroup::"
            echo "::error::Cursor webhook returned HTTP ${HTTP_CODE}"
            exit 1
          fi

          gh issue comment "${ISSUE_NUMBER}" \
            --repo "${REPOSITORY}" \
            --body "Cloud agent started via Cursor automation for this issue. A pull request will follow when the run completes."
